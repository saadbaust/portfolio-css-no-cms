    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
      <button class="lightbox-close" id="lb-close" aria-label="Close"><i class="fas fa-times"></i></button>
      <button class="lightbox-btn lightbox-prev" id="lb-prev" aria-label="Previous image"><i class="fas fa-chevron-left"></i></button>
      <img class="lightbox-img" id="lb-img" src="" alt="Expanded gallery photo" />
      <p class="lightbox-caption" id="lb-caption"></p>
      <span class="lightbox-counter" id="lb-counter"></span>
      <button class="lightbox-btn lightbox-next" id="lb-next" aria-label="Next image"><i class="fas fa-chevron-right"></i></button>
    </div>

    <button id="back-to-top" aria-label="Scroll back to top">
      <i class="fas fa-arrow-up"></i>
    </button>

    <script>
    const lightbox  = document.getElementById('lightbox');
    const lbImg     = document.getElementById('lb-img');
    const lbCaption = document.getElementById('lb-caption');
    const lbCounter = document.getElementById('lb-counter');

    const items     = document.querySelectorAll('.masonry-item');
    const srcs      = Array.from(items).map(item => ({
      src:     item.querySelector('img').src,
      alt:     item.querySelector('img').alt,
      caption: item.querySelector('.masonry-caption')?.textContent.trim() || ''
    }));
    let current = 0;

    function updateLightbox() {
      lbImg.src               = srcs[current].src;
      lbImg.alt               = srcs[current].alt;
      lbCaption.textContent   = srcs[current].caption;
      lbCounter.textContent   = `${current + 1} / ${srcs.length}`;
    }

    function openLightbox(idx) {
      current = idx;
      updateLightbox();
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function prevPhoto() { current = (current - 1 + srcs.length) % srcs.length; updateLightbox(); }
    function nextPhoto() { current = (current + 1)               % srcs.length; updateLightbox(); }

    items.forEach((item, i) => item.addEventListener('click', () => openLightbox(i)));

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', prevPhoto);
    document.getElementById('lb-next').addEventListener('click', nextPhoto);

    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'ArrowLeft')  prevPhoto();
      if (e.key === 'ArrowRight') nextPhoto();
      if (e.key === 'Escape')     closeLightbox();
    });

    const btn = document.getElementById('back-to-top');
    btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    window.addEventListener('scroll', () => {
      btn.classList.toggle('visible', window.scrollY > 300);
    }, { passive: true });
    </script>
